<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Subject</th>
                <th>Student Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John</td>
                <td>Mathematics</td>
                <td>80</td>
            </tr>
            <tr>
                <td>John</td>
                <td>Science</td>
                <td>90</td>
            </tr>
            <tr>
                <td>John</td>
                <td>English</td>
                <td>92</td>
            </tr>
        </tbody>
    </table>

    <br><br><hr><br><br>

    <table border="2" cellpadding="10" cellspacing="2">
        <tr>
            <td>Quick</td>
            <td colspan="2">brown fox</td>
            <td>jumps</td>
        </tr>
        <tr>
            <td rowspan="3">over the</td>
            <td>lazy</td>
            <td>dog</td>
            <td>and</td>
        </tr>
        <tr>
            <td>then</td>
            <td>it</td>
            <td>fall</td>
        </tr>
        <tr>
            <td colspan="3">prey to a lion</td>
        </tr>
    </table>
</body>
</html>
