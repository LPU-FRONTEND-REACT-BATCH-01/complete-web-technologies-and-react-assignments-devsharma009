<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>Prepare Veg Biryani in Ordered Steps</h1>
    <ol type="1" start="1" >                <!-- ol: ordered list, type: 1, A, a, I, i, start: starting number-->
        <li>Soak the rice</li>
        <li>Boil the rice</li>
        <li>Drain the rice</li>
        <li>Add the vegetables and paneer</li>
        <li>Stir the mixture</li>
        <li>Veg biryani is ready</li>
    </ol>

    <h1>Ingredients for Veg Biryani</h1>
    <ul type="square">    <!-- ul: unordered list, type: disc, circle, square -->
        <li>Rice</li>
        <li>Vegetables</li>
        <li>Paneer</li>
        <li>Spices</li>
        <li>Oil</li>
        <li>Salt</li>
    </ul>
    
</body>
</html>
