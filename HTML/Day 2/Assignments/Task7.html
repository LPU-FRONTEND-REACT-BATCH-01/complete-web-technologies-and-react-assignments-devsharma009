<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking form</title>
</head>
<body>
    <h1><i>Hotel Booking Form</i></h1>
    <form action="" method="post">
        <label for="name">Name: </label>
        <input type="text" id="name" required placeholder="Enter your first name">
        <input type="text" id="name" required placeholder="Enter your last name"><br><br>

        <label for="email">Email: </label>
        <input type="email" required id ="email" placeholder="Enter your email"><br><br>

        <label for="phone">Phone Number: </label>
        <input type="number" required id ="phone" placeholder="Enter your phone number"><br><br>

        <label for="gender">Gender: </label>
        <input type="radio" name="gender" id="male" value="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female" value="female">
        <label for="female">Female</label><br><br>


        <label for="roomType">Room Type: </label>
        <select id="roomType" required>
            <option value="">Select Room Type</option>
            <option value="single">Single Bed</option>
            <option value="double">Double Bed</option>
            <option value="suite">Suite</option>
        </select><br><br>

        <label for="guests">Number of Guests: </label>
        <input type="number" id="guests" min="1" max="10" required><br><br>

        <label for="checkin">Check-in Date and Time: </label>
        <input type="datetime-local" id="checkin" required><br><br>

        <label for="checkout">Check-out Date and Time: </label>
        <input type="datetime-local" id="checkout" required><br><br>

        <select name="City" id="">
            <option value="">Select City</option>
            <option value="Jalandhar">Jalandhar</option>
            <option value="Phagwara">Phagwara</option>
            <option value="Ludhiana">Ludhiana</option>
            <option value="Delhi">Delhi</option>
        </select><br><br>

        <input for="termsAndConditions" type="checkbox">Agree terms and Conditions<br><br>
        <textarea name="request" id="request" placeholder="Special Requests"></textarea><br><br>
        <input type="submit" value="Book Now">
    </form>
    
</body>
</html>
