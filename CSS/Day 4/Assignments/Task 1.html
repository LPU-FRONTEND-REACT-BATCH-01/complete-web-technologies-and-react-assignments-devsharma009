<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Task</title>
    <style>

    body{
        background-color: rgba(6, 6, 94, 0.747);
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .container{
        display: grid;
        grid-template-columns: 150px 150px 150px 150px;
        grid-template-rows: 150px 150px 150px 150px;
        gap: 10px;
    }

    .box{
        border: 3px solid black;
    }

    .item1,.item2,.item8{
        background-color: rgba(131, 239, 131, 0.881);
    }

    .item3, .item5, .item6{
        background-color: brown;
    }

    .item4, .item7{
        background-color: rgba(255, 166, 0, 0.658);
    }

    .item1{
        grid-row: 1/4;
        grid-column: 1/2;
    }

    .item2{
        grid-row: 1/2;
        grid-column: 2/4;
    }

    .item3{
        grid-row: 1/2;
        grid-column: 4/5;
    }

    .item4{
        grid-row: 2/3;
        grid-column: 2/3;
    }

    .item5{
        grid-row: 2/3;
        grid-column: 3/4;
    }

    .item6{
        grid-row: 3/4;
        grid-column: 2/3;
    }

    .item7{
        grid-row: 3/4;
        grid-column: 3/4;
    }

    .item8{
        grid-row: 2/4;
        grid-column: 4/5;
    }


    </style>
</head>
<body>
    <div class="container">
        <div class="item1 box"></div>
        <div class="item2 box"></div>
        <div class="item3 box"></div>
        <div class="item4 box"></div>
        <div class="item5 box"></div>
        <div class="item6 box"></div>
        <div class="item7 box"></div>
        <div class="item8 box"></div>
    </div>
</body>
</html>
