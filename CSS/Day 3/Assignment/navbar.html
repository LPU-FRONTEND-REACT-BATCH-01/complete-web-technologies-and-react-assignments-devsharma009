<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="navbar">

            <div class="logo-version">
                <img src="./Assets/logo.svg" alt="React Logo">
                <p>v19.2</p>
            </div>

            <div class="search-bar">
                <img class="search-icon-mobile" src="./Assets/search.svg" alt="Search">

                <div class="search-container">
                    <div class="search-text">
                        <img src="./Assets/search.svg" alt="Search" width="14" height="14">
                        <p>Search</p>
                    </div>
                    <div class="ctrl-k">
                        <div class="ctrl"><p>Ctrl</p></div>
                        <div class="k"><p>K</p></div>
                    </div>
                </div>
            </div>

            <ul class="menu-items">
                <li>Learn</li>
                <li>Reference</li>
                <li>Community</li>
                <li>Blog</li>
            </ul>

            <ul class="icons">
                <li><img src="./Assets/theme.jpeg" alt="Toggle Theme"></li>
                <li><img src="./Assets/translater.svg" alt="Language"></li>
                <li><img src="./Assets/github.jpeg" alt="GitHub"></li>
            </ul>

        </div>
    </nav>
</body>
</html>
