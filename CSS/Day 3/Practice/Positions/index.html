<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positions</title>
    <style>
        body{
            margin-bottom: 1000px;
        }
        .container{
            width: 500px;
            height: 400px;
            background-color: bisque;
            position: relative;     /*relative: items will be moved based on their origin position */
            top: 100px;
            left: 50px
        }

        .item{
            width: 100px;
            height: 100px;
            background-color: lightslategray;
            border: 2px solid black;
            /* position: absolute;  */
                /*absolute: items will be moved based on the container's position */
        }

        .items1{
            position: relative;
            top: 20px;
            left: 20px;
        }
        
        .items2{
            position: fixed;  /*fixed: items will be moved based on the viewport's position */
            top: 0px;
            right: 0px;
        }

        .items3{
            position: sticky;  /*sticky: items will be moved based on the scroll position */
            top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="items1 item">Box 1</div>
        <div class="items2 item">Box 2</div>
        <div class="items3 item">Box 3</div>
    </div>
</body>
</html>
