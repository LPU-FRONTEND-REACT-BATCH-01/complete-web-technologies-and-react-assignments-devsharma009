<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Units and size</title>
</head>
<style>
    nav{
        width: 100vw;
        height: 70px;
        background-color:blanchedalmond;
    }

    input{
        width: 70%;
        height: 40px;
        background-color: lightblue;
    }

    .html{
        font-size: 10px;
    }
    .parent{
        width: 400px;
        height: 400px;
        background-color: aquamarine;
        font-size: 1rem;
    }

    .child1{
        font-size: 2em;       /*em -> element*/
    }

    .child2{
        font-size: 2em;
    }

    .child3{
        font-size: 2em;
    }
</style>
<body>
    <nav>
        <input type="text">
    </nav>

    <div class="parent">
        <p class="child1">This is child 1</p>
        <p class="child2">This is child 2</p>
        <p class="child3">This is child 3</p>
    </div>
</body>
</html>
