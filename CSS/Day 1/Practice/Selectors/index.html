<!--Selectors-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #fruits_heading{
        color: red;
        text-align: center;
        background-color: lightgray;
    }
    #banana{
        font-style: italic;
    }
    .fruits{
        color: green;
        font-size: 20px;
    }
    .apple{
        font-weight: bold;
    }
</style>
<body>
    <ul>
        <h1 id="fruits_heading">Fruits</h1>
        <li class="apple" class="fruits" >Apple</li>
        <li id="banana" class="fruits" >Banana</li>
        <li class="fruits">Cherry</li>
        <li class="fruits">Mango</li>
        <li class="fruits">Kiwi</li>
    </ul>
</body>
</html>
