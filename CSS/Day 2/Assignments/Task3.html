<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3</title>
    <style>
        
        html{
            font-family:Arial, Helvetica, sans-serif sans-serif;
        }
        .style{
            height: 350px;
            width: 500px;
        }

        .quote{
            text-align: center;
            font-size: 30px; 
        }
        
        .author{
            color: grey;
            font-style: italic;
            font-size: 30px;
            text-align: center;
            text-decoration: underline;
        }
        
        .t{
            font-size: 50px;
            color: darkblue;
        }
        
        .style:hover{
            box-shadow: 10px 10px 10px whitesmoke;
        }
        
        .style:hover .quote{
            letter-spacing: 1px;
        }

        .style:hover .author{
            color: purple;
        }
    

        
    </style>
</head>
<body>
    <div class="style">
        <p class="quote"><span class="t">T</span>he only way to do greate work is to love what you do.</p>
        <p class="author">-Steve Jobs</p>
    </div>
</body>
</html>
